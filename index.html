<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Prompts: Grok Video</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .toggle-checkbox:checked + .toggle-label { background-color: #2563EB; }
    #videoCanvas { display: none; }
  </style>
</head>
<body class="min-h-screen bg-neutral-900 text-neutral-100 p-4 md:p-8 font-sans">
  <div class="max-w-3xl mx-auto space-y-6">
    
    <div class="flex items-center justify-between pb-4 border-b border-neutral-800">
      <div class="flex items-center space-x-3">
        <i data-lucide="wand-2" class="w-8 h-8 text-blue-500"></i>
        <h1 class="text-2xl font-bold">Grok Video Helper</h1>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="space-y-5 bg-neutral-800 p-5 rounded-xl border border-neutral-700">
        
        <div class="p-4 bg-blue-900/10 border border-blue-500/20 rounded-lg space-y-3">
          <label class="flex items-center space-x-2 text-sm font-bold text-blue-400">
            <i data-lucide="image" class="w-4 h-4"></i>
            <span>Extrair Último Frame (Continuidade)</span>
          </label>
          <input type="file" id="videoInput" accept="video/*" class="w-full text-xs text-neutral-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
          <button id="extractBtn" class="w-full bg-neutral-700 hover:bg-neutral-600 text-white text-xs py-2 rounded-lg transition-all hidden flex items-center justify-center space-x-2">
            <i data-lucide="download" class="w-4 h-4"></i>
            <span>Baixar Último Frame</span>
          </button>
          <canvas id="videoCanvas"></canvas>
        </div>

        <div class="space-y-2">
          <label class="flex items-center space-x-2 text-sm font-medium text-neutral-300">
            <i data-lucide="video" class="w-4 h-4"></i>
            <span>Ideia Principal do Vídeo</span>
          </label>
          <textarea id="subject" placeholder="Ex: Jesus caminhando sobre as águas..." class="w-full bg-neutral-900 border border-neutral-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none h-24"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-xs font-medium text-neutral-400">Câmera</label>
            <select id="camera" class="w-full bg-neutral-900 border border-neutral-700 rounded-lg p-2 text-xs focus:outline-none">
              <option value="Cinematográfica 4K">Cinematográfica</option>
              <option value="Visão de Drone">Drone</option>
              <option value="Câmera Lenta">Slow Motion</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-xs font-medium text-neutral-400">Duração</label>
            <select id="duration" class="w-full bg-neutral-900 border border-neutral-700 rounded-lg p-2 text-xs focus:outline-none">
              <option value="6">6s</option>
              <option value="10">10s</option>
            </select>
          </div>
        </div>

        <div class="space-y-3 pt-2">
          <label class="flex items-center space-x-3 cursor-pointer">
            <input type="checkbox" id="extend" class="w-4 h-4 rounded border-neutral-700 bg-neutral-900 text-blue-600">
            <span class="text-sm text-neutral-300">Extender Vídeo (--extend)</span>
          </label>
          <label class="flex items-center space-x-3 cursor-pointer">
            <input type="checkbox" id="zoomFaceEnd" class="w-4 h-4 rounded border-neutral-700 bg-neutral-900 text-blue-600">
            <span class="text-sm text-neutral-300">Zoom no Rosto no Final</span>
          </label>
        </div>
      </div>

      <div class="space-y-4">
        <div class="bg-blue-900/20 border border-blue-500/30 rounded-xl p-5 h-full flex flex-col">
          <h2 class="text-lg font-semibold text-blue-400 mb-4">Prompt Gerado</h2>
          <div id="generatedPrompt" class="flex-1 bg-neutral-900/50 rounded-lg p-4 border border-neutral-800 text-neutral-200 text-sm leading-relaxed whitespace-pre-wrap">
            Aguardando ideia...
          </div>
          <button id="copyBtn" class="mt-4 w-full flex items-center justify-center space-x-2 py-3 rounded-lg font-medium bg-blue-600 hover:bg-blue-700 text-white">
            <i data-lucide="copy" class="w-5 h-5"></i>
            <span id="copyText">Copiar Prompt</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // Elementos de Vídeo/Frame
    const videoInput = document.getElementById('videoInput');
    const extractBtn = document.getElementById('extractBtn');
    const canvas = document.getElementById('videoCanvas');
    const ctx = canvas.getContext('2d');

    // Lógica para extrair último frame
    videoInput.addEventListener('change', function() {
      if (this.files && this.files[0]) {
        extractBtn.classList.remove('hidden');
      }
    });

    extractBtn.addEventListener('click', function() {
      const file = videoInput.files[0];
      const video = document.createElement('video');
      video.src = URL.createObjectURL(file);
      
      video.onloadedmetadata = function() {
        video.currentTime = video.duration - 0.1; // Vai para o final
      };

      video.onseeked = function() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const link = document.createElement('a');
        link.download = 'ultimo-frame-grok.jpg';
        link.href = canvas.toDataURL('image/jpeg');
        link.click();
      };
    });

    // Lógica do Prompt (Mesma do anterior)
    const inputs = ['subject', 'camera', 'duration', 'extend', 'zoomFaceEnd'];
    function gerar() {
      const s = document.getElementById('subject').value;
      if(!s) return;
      let p = [`Vídeo: ${s}.`, `Estilo: ${document.getElementById('camera').value}.`, `Duração: ${document.getElementById('duration').value}s.`];
      if(document.getElementById('extend').checked) p.push('--extend');
      if(document.getElementById('zoomFaceEnd').checked) p.push('Finalizar com zoom no rosto para continuidade.');
      document.getElementById('generatedPrompt').innerText = p.join(' ');
    }

    inputs.forEach(id => document.getElementById(id).addEventListener('input', gerar));

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('generatedPrompt').innerText);
      document.getElementById('copyText').innerText = "Copiado!";
      setTimeout(() => { document.getElementById('copyText').innerText = "Copiar Prompt"; }, 2000);
    });
  </script>
</body>
</html>
